# =============================================================================
# config.conf — Audit System Configuration
# Linux System Audit and Monitoring — NSCS 2025/2026
#
# Edit this file to match your setup.
# All scripts load this file automatically through utils.sh.
# Do NOT put spaces around the = sign.
# =============================================================================

# ── Paths ─────────────────────────────────────────────────────────────────────
# Where generated report files (.txt, .html, .json) are saved
REPORT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" 2>/dev/null && pwd)/reports"

# Where the execution log is written (cron runs, errors, audit history)
LOG_FILE="$(cd "$(dirname "${BASH_SOURCE[0]}")" 2>/dev/null && pwd)/logs/audit.log"

# ── Report settings ───────────────────────────────────────────────────────────
# Reports older than this many days are deleted by "Clear old reports"
LOG_RETENTION_DAYS=30

# ── Email settings ────────────────────────────────────────────────────────────
# Who receives the report emails
EMAIL_RECIPIENT="ch.marie1219@gmail.com"

# The From: address (must match your msmtp account configuration)
EMAIL_SENDER="madmax.max3131@gmail.com"

# Short text added before the subject line of every audit email
EMAIL_SUBJECT_PREFIX="[SysAudit]"

# ── Cron automation ───────────────────────────────────────────────────────────
# Schedule for automated audits (crontab format: minute hour day month weekday)
# Default: every day at 04:00 AM
CRON_SCHEDULE="0 4 * * *"

# ── Remote monitoring ─────────────────────────────────────────────────────────
# IP address or hostname of the remote machine to monitor via SSH.
# Leave empty ("") to disable remote monitoring.
REMOTE_HOST=""
REMOTE_USER="root"
REMOTE_PORT="22"

# Where reports are copied on the remote server
REMOTE_REPORT_DIR="/tmp/audit_reports"

